name: Verify Engine Code

on:
  pull_request:
  push:
    paths:
    - '.github/workflows/engine.yml'
    - 'package.json'
    - 'package-lock.json'
    - 'src/**'
    - 'tools/**'
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - uses: actions/setup-node@v6
      with:
        node-version: 24
        cache: npm

    - run: npm ci

    - name: Lint
      run: npm run lint

    - name: Compile
      run: npx tsc --noEmit
